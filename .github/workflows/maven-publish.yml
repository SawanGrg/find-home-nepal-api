name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Decode and Save Private & Public Keys
      run: |
        echo "${{ secrets.PRIVATE_KEY_PEM }}" | base64 --decode > private_key.pem
        chmod 600 private_key.pem  # Secure permissions
        echo "${{ secrets.PUBLIC_KEY_PEM }}" | base64 --decode > public_key.pem
        chmod 644 public_key.pem  # Public key needs fewer restrictions

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
